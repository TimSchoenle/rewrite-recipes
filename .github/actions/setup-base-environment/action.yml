name: "Setup Java and Gradle Environment"
description: "Setup Java and Gradle environment for building"

inputs:
  java_version:
    description: "Java version to install"
    required: false
    default: "21"

runs:
  using: 'composite'
  steps:
    - name: Set up JDK
      uses: TimSchoenle/actions/actions/java-gradle/setup-base-environment@a6a97ef1f7dc2e5af7264e90366c7a0b48d4e0d5 # tag=actions-java-gradle-setup-base-environment-v1.2.6
      with:
        java_version: ${{ inputs.java_version }}
