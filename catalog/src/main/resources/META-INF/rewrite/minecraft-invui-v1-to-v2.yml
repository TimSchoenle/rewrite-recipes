      newGroupId: xyz.xenondevs.invui
      newArtifactId: invui
      changeManagedDependency: true
  - org.openrewrite.gradle.UpgradeDependencyVersion:
      groupId: xyz.xenondevs.invui
      artifactId: invui
      newVersion: 2.x
